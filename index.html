<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="center">Todo List</h1>
    </header>


    <main class="container">
        <h2 class="margin">Bandeja de tareas</h2>

        <!--Div donde van las tareas-->
        <div id="Tareass">
            
        </div>


        <!--Div que se elinar al agregar tarea-->
        <div class="container__tarea">
            <img src="img/Bandeja.png" alt="Imagen Bandeja">
            <p class="center">
                La bandeja de tareas es el lugar ideal para
                añadir tus tareas de forma rapida.
            </p>
            <button class="boton boton--add">+ Añadir tarea</button>
        </div>

    </main>

    
    <script src="js/script.js"></script>
</body>
</html>
